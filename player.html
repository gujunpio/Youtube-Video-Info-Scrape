<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    .placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      color: #555; font-family: system-ui, sans-serif; font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="placeholder" id="placeholder">Waiting for video…</div>
  <iframe id="yt-embed" src="" style="display:none"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
    allowfullscreen></iframe>

  <script>
    window.addEventListener('message', function(e) {
      if (e.data && e.data.type === 'LOAD_VIDEO') {
        var iframe = document.getElementById('yt-embed');
        var placeholder = document.getElementById('placeholder');
        iframe.src = 'https://www.youtube.com/embed/' + e.data.videoId + '?rel=0&autoplay=0';
        iframe.style.display = 'block';
        placeholder.style.display = 'none';
      }
    });
  </script>
</body>
</html>
