<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube Video Info</title>
  <meta name="description" content="Trích xuất thông tin video YouTube: ID, tiêu đề, mô tả và thumbnail chỉ trong một cú click." />

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0f0f1a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-orbs" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="24" height="24" rx="6" fill="url(#ytGrad)"/>
            <polygon points="10,8 16,12 10,16" fill="white"/>
            <defs>
              <linearGradient id="ytGrad" x1="0" y1="0" x2="24" y2="24">
                <stop offset="0%" stop-color="#ff4e6a"/>
                <stop offset="100%" stop-color="#c1001f"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <div>
          <h1 class="logo-title">YouTube Video Info</h1>
          <p class="logo-subtitle">Trích xuất thông tin video tức thì</p>
        </div>
      </div>
    </header>

    <!-- Input Section -->
    <section class="input-section">
      <div class="input-wrapper" id="input-wrapper">
        <div class="input-icon">
          <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z" fill="currentColor"/>
          </svg>
        </div>
        <input
          type="url"
          id="yt-url-input"
          class="url-input"
          placeholder="Dán link YouTube vào đây…"
          autocomplete="off"
          spellcheck="false"
          aria-label="YouTube URL input"
        />
        <button id="clear-btn" class="clear-btn" aria-label="Xóa" title="Xóa" style="display:none;">
          <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M6 6l8 8M14 6l-8 8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <button id="extract-btn" class="extract-btn" aria-label="Trích xuất thông tin">
        <span class="btn-text">Trích xuất</span>
        <span class="btn-icon">
          <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M10 3v10M6 9l4 4 4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        <div class="btn-loader" id="btn-loader"></div>
      </button>
    </section>

    <!-- Error Message -->
    <div class="error-banner" id="error-banner" role="alert" aria-live="polite"></div>

    <!-- Results Section -->
    <main class="results-section" id="results-section" aria-live="polite">

      <!-- Result Card 1: Video ID -->
      <article class="result-card" id="card-id">
        <div class="card-header">
          <div class="card-label">
            <span class="card-badge badge-purple">01</span>
            <span class="card-title">Video ID</span>
          </div>
          <button class="copy-btn" id="copy-id-btn" aria-label="Copy Video ID" data-target="video-id-value">
            <svg class="copy-icon" viewBox="0 0 20 20" fill="none"><rect x="7" y="7" width="10" height="10" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M3 13V5a2 2 0 012-2h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            <svg class="check-icon" viewBox="0 0 20 20" fill="none" style="display:none"><path d="M4 10l4 4 8-8" stroke="#4ade80" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <span class="copy-label">Copy</span>
          </button>
        </div>
        <div class="card-body">
          <code class="mono-value" id="video-id-value">—</code>
        </div>
      </article>

      <!-- Result Card 2: Link + Title + Description -->
      <article class="result-card" id="card-info">
        <div class="card-header">
          <div class="card-label">
            <span class="card-badge badge-blue">02</span>
            <span class="card-title">Link · Tiêu đề · Mô tả</span>
          </div>
          <button class="copy-btn" id="copy-info-btn" aria-label="Copy thông tin video" data-target="video-info-value">
            <svg class="copy-icon" viewBox="0 0 20 20" fill="none"><rect x="7" y="7" width="10" height="10" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M3 13V5a2 2 0 012-2h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            <svg class="check-icon" viewBox="0 0 20 20" fill="none" style="display:none"><path d="M4 10l4 4 8-8" stroke="#4ade80" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <span class="copy-label">Copy</span>
          </button>
        </div>
        <div class="card-body">
          <pre class="info-value" id="video-info-value">—</pre>
        </div>
      </article>

      <!-- Result Card 3: Thumbnail -->
      <article class="result-card" id="card-thumb">
        <div class="card-header">
          <div class="card-label">
            <span class="card-badge badge-red">03</span>
            <span class="card-title">Thumbnail</span>
          </div>
          <div class="thumb-actions">
            <a class="copy-btn download-btn" id="download-thumb-btn" aria-label="Tải thumbnail" download="thumbnail.jpg" target="_blank" rel="noreferrer">
              <svg viewBox="0 0 20 20" fill="none"><path d="M10 3v10M6 9l4 4 4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
              <span class="copy-label">Tải</span>
            </a>
            <button class="copy-btn" id="copy-thumb-url-btn" aria-label="Copy URL thumbnail">
              <svg class="copy-icon" viewBox="0 0 20 20" fill="none"><rect x="7" y="7" width="10" height="10" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M3 13V5a2 2 0 012-2h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
              <svg class="check-icon" viewBox="0 0 20 20" fill="none" style="display:none"><path d="M4 10l4 4 8-8" stroke="#4ade80" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
              <span class="copy-label">Copy URL</span>
            </button>
          </div>
        </div>
        <div class="card-body thumb-body">
          <div class="thumb-placeholder" id="thumb-placeholder">
            <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect width="48" height="48" rx="12" fill="rgba(255,255,255,0.04)"/>
              <path d="M16 20a4 4 0 014-4h8a4 4 0 014 4v8a4 4 0 01-4 4h-8a4 4 0 01-4-4v-8z" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
              <circle cx="20" cy="22" r="2" fill="rgba(255,255,255,0.15)"/>
              <path d="M16 30l5-5 3 3 2-2 6 6" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>Thumbnail sẽ hiển thị tại đây</span>
          </div>
          <div class="thumb-container" id="thumb-container" style="display:none;">
            <div class="thumb-quality-tabs" id="thumb-quality-tabs">
              <button class="quality-tab active" data-quality="maxres" id="tab-maxres">Max HD</button>
              <button class="quality-tab" data-quality="hq" id="tab-hq">HQ</button>
              <button class="quality-tab" data-quality="mq" id="tab-mq">MQ</button>
              <button class="quality-tab" data-quality="sd" id="tab-sd">SD</button>
            </div>
            <div class="thumb-img-wrapper">
              <img id="thumbnail-img" class="thumbnail-img" src="" alt="YouTube Thumbnail" loading="lazy" />
              <div class="thumb-resolution" id="thumb-resolution"></div>
            </div>
          </div>
        </div>
      </article>

    </main>

    <footer class="app-footer">
      <p>Dữ liệu được trích xuất trực tiếp từ YouTube · Không lưu trữ thông tin</p>
    </footer>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="app.js"></script>
</body>
</html>
